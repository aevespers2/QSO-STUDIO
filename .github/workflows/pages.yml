name: Documentation

on:
  pull_request:
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - "README.md"
      - "taskchain.md"
      - "punchlist.md"
      - "release.md"
      - "changelog.md"
      - ".github/workflows/pages.yml"
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - "README.md"
      - "taskchain.md"
      - "punchlist.md"
      - "release.md"
      - "changelog.md"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: documentation-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      EXPECTED_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - name: Check out submitted source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ env.EXPECTED_SHA }}
          fetch-depth: 1
          persist-credentials: false

      - name: Verify source identity and initialize evidence
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$EXPECTED_SHA"
          test -z "$(git status --porcelain)"
          mkdir -p evidence
          printf '%s\n' "$EXPECTED_SHA" > evidence/head-sha.txt
          git status --porcelain=v1 > evidence/worktree-status.txt
          sha256sum requirements-docs.txt > evidence/requirements-docs.sha256

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"

      - name: Record runtime versions
        shell: bash
        run: |
          set -euo pipefail
          python --version 2>&1 | tee evidence/python-version.txt
          python -m pip --version 2>&1 | tee evidence/pip-version.txt

      - name: Install pinned documentation toolchain
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check --requirement requirements-docs.txt 2>&1 \
            | tee evidence/install.log
          python -m pip freeze --all | LC_ALL=C sort > evidence/installed-packages.txt

      - name: Build documentation strictly
        shell: bash
        run: |
          set -euo pipefail
          rm -rf site
          mkdocs build --strict 2>&1 | tee evidence/mkdocs-build.log

      - name: Validate generated site and record evidence
        shell: python
        env:
          SOURCE_SHA: ${{ env.EXPECTED_SHA }}
        run: |
          import hashlib
          import json
          import os
          from pathlib import Path

          site = Path("site")
          if not site.is_dir():
              raise SystemExit("site directory was not generated")

          records = []
          for path in sorted(site.rglob("*")):
              if path.is_symlink():
                  raise SystemExit(f"generated site contains symlink: {path}")
              if path.is_file():
                  data = path.read_bytes()
                  records.append({
                      "path": path.relative_to(site).as_posix(),
                      "bytes": len(data),
                      "sha256": hashlib.sha256(data).hexdigest(),
                  })

          if not records:
              raise SystemExit("generated site is empty")

          evidence = Path("evidence")
          manifest_path = evidence / "documentation-evidence.json"
          manifest = {
              "repository": "aevespers2/QSO-STUDIO",
              "source_sha": os.environ["SOURCE_SHA"],
              "generator": "mkdocs build --strict",
              "files": records,
          }
          manifest_path.write_text(
              json.dumps(manifest, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          summary = {
              "source_sha": manifest["source_sha"],
              "file_count": len(records),
              "manifest_sha256": hashlib.sha256(manifest_path.read_bytes()).hexdigest(),
          }
          (evidence / "summary.json").write_text(
              json.dumps(summary, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          print(json.dumps(summary, indent=2, sort_keys=True))

      - name: Hash retained evidence
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p evidence
          find evidence -maxdepth 1 -type f ! -name SHA256SUMS -print0 \
            | LC_ALL=C sort -z \
            | xargs -0 -r sha256sum > evidence/SHA256SUMS

      - name: Upload rendered site and evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: qso-studio-documentation-${{ github.run_id }}-${{ env.EXPECTED_SHA }}
          path: |
            site/
            evidence/
          if-no-files-found: error
          retention-days: 30
