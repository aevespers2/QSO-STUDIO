name: Documentation

on:
  pull_request:
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "README.md"
      - "taskchain.md"
      - "punchlist.md"
      - "release.md"
      - "changelog.md"
      - ".github/workflows/pages.yml"
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "README.md"
      - "taskchain.md"
      - "punchlist.md"
      - "release.md"
      - "changelog.md"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install pinned documentation toolchain
        run: python -m pip install "mkdocs==1.6.1"
      - name: Build documentation strictly
        run: mkdocs build --strict
      - name: Upload documentation artifact
        uses: actions/upload-artifact@v4
        with:
          name: qso-studio-site
          path: site/
          if-no-files-found: error
          retention-days: 14
