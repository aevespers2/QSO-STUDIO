name: Architecture Review Quorum Consumer

on:
  pull_request:
    paths:
      - "docs/architecture-review-quorum-conformance.md"
      - "fixtures/architecture-review-producer-source-v1.json"
      - "fixtures/architecture-review-quorum-v1.json"
      - "fixtures/architecture-review-quorum-extension-v1.json"
      - "scripts/check_architecture_review_quorum_consumer.py"
      - "scripts/check_architecture_review_source_identity.py"
      - "scripts/check_architecture_review_source_tuple.py"
      - "tests/test_check_architecture_review_quorum_consumer.py"
      - "tests/test_check_architecture_review_source_identity.py"
      - "tests/test_check_architecture_review_source_tuple.py"
      - "mkdocs.yml"
      - "README.md"
      - "taskchain.md"
      - "release.md"
      - "changelog.md"
      - ".github/workflows/architecture-review-quorum.yml"
  push:
    branches: [main]
    paths:
      - "docs/architecture-review-quorum-conformance.md"
      - "fixtures/architecture-review-producer-source-v1.json"
      - "fixtures/architecture-review-quorum-v1.json"
      - "fixtures/architecture-review-quorum-extension-v1.json"
      - "scripts/check_architecture_review_quorum_consumer.py"
      - "scripts/check_architecture_review_source_identity.py"
      - "scripts/check_architecture_review_source_tuple.py"
      - "tests/test_check_architecture_review_quorum_consumer.py"
      - "tests/test_check_architecture_review_source_identity.py"
      - "tests/test_check_architecture_review_source_tuple.py"
      - "mkdocs.yml"
      - "README.md"
      - "taskchain.md"
      - "release.md"
      - "changelog.md"
      - ".github/workflows/architecture-review-quorum.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: studio-architecture-review-quorum-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  consumer-conformance:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      EXPECTED_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

    steps:
      - name: Check out exact submitted source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ env.EXPECTED_SHA }}
          fetch-depth: 1
          persist-credentials: false
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.13"
          cache: ""

      - name: Assert source and required consumer files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p evidence
          test "$(git rev-parse HEAD)" = "$EXPECTED_SHA"
          test -z "$(git status --porcelain)"
          required=(
            docs/architecture-review-quorum-conformance.md
            fixtures/architecture-review-producer-source-v1.json
            fixtures/architecture-review-quorum-v1.json
            fixtures/architecture-review-quorum-extension-v1.json
            scripts/check_architecture_review_quorum_consumer.py
            scripts/check_architecture_review_source_identity.py
            scripts/check_architecture_review_source_tuple.py
            tests/test_check_architecture_review_quorum_consumer.py
            tests/test_check_architecture_review_source_identity.py
            tests/test_check_architecture_review_source_tuple.py
            mkdocs.yml
            README.md
            taskchain.md
            release.md
            changelog.md
          )
          for path in "${required[@]}"; do
            test -f "$path"
          done
          {
            printf 'repository=%s\n' "$GITHUB_REPOSITORY"
            printf 'source_sha=%s\n' "$(git rev-parse HEAD)"
            printf 'workflow_run=%s\n' "$GITHUB_RUN_ID"
            printf 'workflow_attempt=%s\n' "$GITHUB_RUN_ATTEMPT"
          } | tee evidence/source-identity.txt

      - name: Verify external source tuple and raw fixture identity before parsing
        id: consumer
        continue-on-error: true
        shell: bash
        run: |
          set +e
          python3 scripts/check_architecture_review_source_identity.py \
            > evidence/studio-quorum-consumer-report.txt 2>&1
          status=$?
          cat evidence/studio-quorum-consumer-report.txt
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run consumer source-tuple and source-identity regressions
        id: tests
        continue-on-error: true
        shell: bash
        run: |
          set +e
          python3 -m unittest \
            tests.test_check_architecture_review_quorum_consumer \
            tests.test_check_architecture_review_source_identity \
            tests.test_check_architecture_review_source_tuple \
            -v > evidence/studio-quorum-consumer-tests.txt 2>&1
          status=$?
          cat evidence/studio-quorum-consumer-tests.txt
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Record deterministic hashes
        shell: bash
        run: |
          set -euo pipefail
          sha256sum \
            docs/architecture-review-quorum-conformance.md \
            fixtures/architecture-review-producer-source-v1.json \
            fixtures/architecture-review-quorum-v1.json \
            fixtures/architecture-review-quorum-extension-v1.json \
            scripts/check_architecture_review_quorum_consumer.py \
            scripts/check_architecture_review_source_identity.py \
            scripts/check_architecture_review_source_tuple.py \
            tests/test_check_architecture_review_quorum_consumer.py \
            tests/test_check_architecture_review_source_identity.py \
            tests/test_check_architecture_review_source_tuple.py \
            mkdocs.yml \
            README.md \
            taskchain.md \
            release.md \
            changelog.md \
            > evidence/input-sha256.txt

      - name: Upload retained evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: studio-architecture-review-quorum-${{ env.EXPECTED_SHA }}
          path: evidence
          if-no-files-found: error
          retention-days: 30

      - name: Fail closed on any unsuccessful check
        shell: bash
        env:
          CONSUMER_STATUS: ${{ steps.consumer.outputs.status }}
          TEST_STATUS: ${{ steps.tests.outputs.status }}
        run: |
          set -euo pipefail
          test "$CONSUMER_STATUS" = "0"
          test "$TEST_STATUS" = "0"
