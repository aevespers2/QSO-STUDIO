name: QSO-STUDIO Documentation Candidate

on:
  pull_request:
    paths:
      - "README.md"
      - "taskchain.md"
      - "release.md"
      - "punchlist.md"
      - "changelog.md"
      - "docs/**"
      - "scripts/check_documentation.py"
      - "tests/test_documentation.py"
      - ".github/workflows/documentation-candidate.yml"
  push:
    branches:
      - main
    paths:
      - "README.md"
      - "taskchain.md"
      - "release.md"
      - "punchlist.md"
      - "changelog.md"
      - "docs/**"
      - "scripts/check_documentation.py"
      - "tests/test_documentation.py"
      - ".github/workflows/documentation-candidate.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: qso-studio-docs-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  documentation:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUBMITTED_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Check out exact submitted source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ env.SUBMITTED_SHA }}
          fetch-depth: 1
          persist-credentials: false
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.13"
          cache: ""

      - name: Assert immutable clean source
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$SUBMITTED_SHA"
          test -z "$(git status --porcelain)"
          evidence="$RUNNER_TEMP/qso-studio-documentation-evidence"
          mkdir -p "$evidence"
          {
            printf 'repository=%s\n' "$GITHUB_REPOSITORY"
            printf 'source_sha=%s\n' "$SUBMITTED_SHA"
            printf 'event_name=%s\n' "$GITHUB_EVENT_NAME"
            printf 'ref=%s\n' "$GITHUB_REF"
            printf 'workflow_run=%s\n' "$GITHUB_RUN_ID"
            printf 'workflow_attempt=%s\n' "$GITHUB_RUN_ATTEMPT"
          } | tee "$evidence/source-identity.txt"

      - name: Validate documentation integrity
        id: validator
        continue-on-error: true
        shell: bash
        run: |
          set +e
          evidence="$RUNNER_TEMP/qso-studio-documentation-evidence"
          python3 scripts/check_documentation.py \
            > "$evidence/documentation-report.json" \
            2> "$evidence/documentation-errors.txt"
          status=$?
          cat "$evidence/documentation-report.json" || true
          cat "$evidence/documentation-errors.txt" >&2 || true
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run hostile regressions
        id: tests
        continue-on-error: true
        shell: bash
        run: |
          set +e
          evidence="$RUNNER_TEMP/qso-studio-documentation-evidence"
          python3 -m unittest tests.test_documentation -v \
            > "$evidence/documentation-tests.txt" 2>&1
          status=$?
          cat "$evidence/documentation-tests.txt"
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Record deterministic inputs
        shell: bash
        run: |
          set -euo pipefail
          evidence="$RUNNER_TEMP/qso-studio-documentation-evidence"
          find docs -type f -print0 | sort -z | xargs -0 sha256sum > "$evidence/docs-sha256.txt"
          sha256sum \
            README.md taskchain.md release.md punchlist.md changelog.md \
            scripts/check_documentation.py tests/test_documentation.py \
            .github/workflows/documentation-candidate.yml \
            > "$evidence/control-sha256.txt"
          git diff --exit-code
          git diff --cached --exit-code
          test -z "$(git status --porcelain)"

      - name: Upload retained evidence
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: qso-studio-documentation-${{ env.SUBMITTED_SHA }}
          path: ${{ runner.temp }}/qso-studio-documentation-evidence
          if-no-files-found: error
          retention-days: 30

      - name: Fail closed on incomplete validation
        shell: bash
        env:
          VALIDATOR_STATUS: ${{ steps.validator.outputs.status }}
          TEST_STATUS: ${{ steps.tests.outputs.status }}
        run: |
          set -euo pipefail
          test "$VALIDATOR_STATUS" = "0"
          test "$TEST_STATUS" = "0"
